name: Tag & Release

on:
  workflow_dispatch:
  pull_request:
    types:
      - closed                

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version:     ${{ steps.get_version.outputs.version }}
      tag_exists:  ${{ steps.tagcheck.outputs.exists }}
    steps:
      - uses: actions/checkout@v5
        with: { fetch-depth: 0 }

      - name: Extract version
        id: get_version
        run: |
          VERSION=$(grep -m1 '^version' pyproject.toml | cut -d '"' -f2)
          echo "version=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if tag exists
        id: tagcheck
        run: |
          git fetch --tags
          if git rev-parse "refs/tags/${{ steps.get_version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true"  >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

  release:
    needs: prepare
    if: >
      github.event.pull_request.merged == true &&
      needs.prepare.outputs.tag_exists == 'false'
    runs-on: ubuntu-latest
    permissions: { contents: write }
    outputs:
      version: ${{ steps.version_info.outputs.version }}
    steps:
      - uses: actions/checkout@v5
        with: { fetch-depth: 0 }

      - name: Export version
        id: version_info
        run: |
          echo "VERSION=${{ needs.prepare.outputs.version }}" >> "$GITHUB_ENV"
          echo "version=${{ needs.prepare.outputs.version }}" >> "$GITHUB_OUTPUT"

      - name: Create Git tag
        run: |
          git config user.name  "github-actions"
          git config user.email "github-actions@github.com"
          git tag "${{ env.VERSION }}"
          git push origin "${{ env.VERSION }}"

      - name: Create GitHub Release
        uses: comnoco/create-release-action@v2.0.5
        env: 
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} 
        with:
          tag_name:     ${{ env.VERSION }}
          release_name: Release ${{ env.VERSION }}
          body:         ${{ github.event.pull_request.body }}

  publish:
    needs: release
    if: needs.release.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment:
      name: pypi
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.release.outputs.version }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build release distributions
        run: |
          uv python install ${{ vars.PYTHON_VERSION }} 
          uv build

      - name: Publish release distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
