name: VCR Scrubbing check

on:
  workflow_dispatch:
  pull_request:

jobs:
  format:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Check VCR are scrubbed
        shell: bash
        run: |
          set -euo pipefail

          failures=$(
            find ./tests -type f -name '*.yaml' -print0 |
              while IFS= read -r -d '' f; do
                if ! grep -qiE '^[[:space:]]*method[[:space:]]*:[[:space:]]*head([[:space:]]|$)' "$f" \
                   && ! grep -qiE "^[[:space:]]*scrubbed[[:space:]]*:[[:space:]]*'1'([[:space:]]|#|$)" "$f"
                then
                  printf '%s\n' "$f"
                fi
              done
          )

          if [ -n "$failures" ]; then
            echo "The following VCR files are not properly scrubbed:"
            echo "$failures"
            exit 1
          fi
